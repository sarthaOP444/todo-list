<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To Do List App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
      background:#fff;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .input-box input{
      flex:1;
      padding:12px;
      border:2px solid #ddd;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    .input-box button{
      padding:12px 18px;
      border:none;
      background:#4facfe;
      color:#fff;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .input-box button:hover{
      background:#2196f3;
    }

    ul{
      list-style:none;
    }

    li{
      background:#f5f5f5;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:0.3s;
    }

    li.completed{
      text-decoration:line-through;
      color:gray;
      background:#e0e0e0;
    }

    .task-text{
      flex:1;
      cursor:pointer;
    }

    .delete-btn{
      background:red;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    .delete-btn:hover{
      background:darkred;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>To Do List</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    function addTask() {
      const taskText = taskInput.value.trim();

      if(taskText === ""){
        alert("Please enter a task");
        return;
      }

      const li = document.createElement("li");

      const span = document.createElement("span");
      span.className = "task-text";
      span.innerText = taskText;

      // Complete task
      span.onclick = function() {
        li.classList.toggle("completed");
      };

      // Delete button
      const deleteBtn = document.createElement("button");
      deleteBtn.innerText = "Delete";
      deleteBtn.className = "delete-btn";

      deleteBtn.onclick = function() {
        li.remove();
      };

      li.appendChild(span);
      li.appendChild(deleteBtn);

      taskList.appendChild(li);

      taskInput.value = "";
    }

    // Add task by pressing Enter
    taskInput.addEventListener("keypress", function(e){
      if(e.key === "Enter"){
        addTask();
      }
    });
  </script>

</body>
</html>
